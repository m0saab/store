<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICETUNISIA</title>
    <style>
        /* Base Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Rapid Background Image Switcher (0.5s intervals) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: backgroundFlash 1s infinite;
        }

        @keyframes backgroundFlash {
            0%, 49.9% {
                background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image1.jpg');
            }
            50%, 100% {
                background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image2.jpg');
            }
        }

        /* Header Styling */
        header {
            text-align: center;
            padding: 30px 20px 10px;
            width: 100%;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* Drop Banner */
        .drop-title {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 10px;
            display: inline-block;
            text-transform: uppercase;
        }

        /* Main Store Layout */
        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 20px;
            flex: 1;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        /* Product Card Link Wrap */
        .product-link {
            text-decoration: none;
            color: inherit;
            display: flex;
        }

        /* Product Card Styling */
        .product-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .product-link:hover .product-card {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Portrait Image Container */
        .image-container {
            width: 100%;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background-color: #111;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: scale 0.5s ease;
        }

        .product-link:hover .image-container img {
            scale: 1.05;
        }

        /* Product Details */
        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            text-align: center;
        }

        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 1.2rem;
            color: #ff4d4d;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Order Button Styling */
        .order-btn {
            margin-top: auto;
            background-color: #ffffff;
            color: #000000;
            padding: 12px 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 6px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .product-link:hover .order-btn {
            background-color: #ff4d4d;
            color: #ffffff;
        }

        /* Footer */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.6;
            width: 100%;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            header h1 {
                font-size: 2rem;
            }
            .drop-title {
                font-size: 0.8rem;
            }
            .container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>ICETUNISIA</h1>
        <div class="drop-title">DROP1/ELNOUSOUR Limited Edition</div>
    </header>

    <main class="container">
        <div class="products-grid">
            
            <a href="https://tally.so/r/RGkOJP" class="product-link" target="_blank">
                <div class="product-card">
                    <div class="image-container">
                        <img src="e1.jpg" alt="Khazri Shirt">
                    </div>
                    <div class="product-info">
                        <h2 class="product-name">Khazri Shirt</h2>
                        <div class="product-price">50 DT</div>
                        <div class="order-btn">Order Now</div>
                    </div>
                </div>
            </a>

            <a href="https://tally.so/r/xXvGNE" class="product-link" target="_blank">
                <div class="product-card">
                    <div class="image-container">
                        <img src="e2.jpg" alt="Clock Tower Shirt">
                    </div>
                    <div class="product-info">
                        <h2 class="product-name">Clock Tower Shirt</h2>
                        <div class="product-price">50 DT</div>
                        <div class="order-btn">Order Now</div>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 ICETUNISIA. All Rights Reserved.</p>
    </footer>

</body>
</html>
