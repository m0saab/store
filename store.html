<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadGames</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        'primary-dark': '#212345',
                        'accent-orange': '#f70',
                        'very-dark-blue': '#0a0d1a',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000;
            color: #1f2937;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Subtle Glass Overlay */
        .glass-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            border-radius: 1rem;
            box-shadow: 0 4px 15px 0 rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.2s ease;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }
    </style>
</head>
<body class="font-cairo flex flex-col min-h-screen">

    <div class="video-bg-container">

                </div>
            </div>

            <div class="glass-card flex flex-col overflow-hidden">
                <div class="relative aspect-square bg-white/20">
                    <img src="3.png" alt="Product 3" class="w-full h-full object-cover">
                </div>
                <div class="p-3 flex flex-col items-center text-center">
                    <h3 class="font-bold text-[11px] md:text-base text-gray-800 mb-1 h-8 md:h-12 overflow-hidden">Koora Uno</h3>
                    <div class="mb-2">
                        <p class="text-primary-dark font-black text-sm md:text-xl">35 دينار</p>
                    </div>
                    <a href="https://tally.so/r/yPMW58" target="_blank" class="bg-accent-orange text-white font-bold py-1.5 rounded-full shadow-md w-full text-[10px] md:text-sm">شراء</a>

            </div>

    <script>
        const video = document.getElementById('bg-video');
        const source = document.getElementById('video-src');

        function updateVideoSource() {
            const isPortrait = window.innerHeight > window.innerWidth;
            const newSrc = isPortrait ? 'B.mp4' : 'A.mp4';
            
            if (source.getAttribute('src') !== newSrc) {
                source.setAttribute('src', newSrc);
                video.load();
                video.play();
            }
        }

        window.addEventListener('resize', updateVideoSource);
        updateVideoSource(); 
    </script>

</body>
</html>
