<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUADGAMESTN | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-accent: #1a1a1a;
            --primary-red: #E70013;
            --card-border: #333333;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --roundness: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-dark); 
            background: radial-gradient(circle at top, #1e1e1e 0%, #0f0f0f 100%);
            color: var(--text-main);
            line-height: 1.4;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 50px 15px 30px;
        }

        h1 { 
            font-size: 1.6rem; 
            letter-spacing: 4px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--primary-red);
            text-shadow: 0 0 15px rgba(231, 0, 19, 0.3);
        }

        /* Shop Grid */
        .shop-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 10px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* Card Styling */
        .product-card {
            display: flex;
            flex-direction: column;
            background: var(--bg-accent);
            border: 1px solid var(--card-border);
            border-radius: var(--roundness);
            padding: 8px;
            transition: transform 0.3s ease;
        }

        .product-card:active {
            transform: scale(0.97);
        }
        
        .img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #252525;
            border-radius: calc(var(--roundness) - 4px);
            margin-bottom: 12px;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 5px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-title { 
            font-size: 0.85rem; 
            font-weight: 400; 
            margin-bottom: 8px;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6em;
        }

        .price-tag { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--primary-red); 
        }
        
        .shipping-note { 
            display: block; 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            margin-bottom: 12px; 
        }

        .buy-now {
            display: block;
            background: var(--primary-red);
            color: white;
            text-decoration: none;
            padding: 10px 5px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: 0.3s;
            margin-top: auto;
        }

        /* Footer */
        footer {
            padding: 50px 20px;
            margin-top: 40px;
            background: #0a0a0a;
        }

        .ig-icon-link {
            font-size: 1.8rem;
            color: var(--primary-red);
            text-decoration: none;
            transition: 0.3s;
        }

        .ig-icon-link:hover { opacity: 0.8; }

        .copyright { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            margin-top: 15px; 
            letter-spacing: 1px; 
        }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            h1 { font-size: 2.5rem; letter-spacing: 8px; }
            .product-grid { 
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
                gap: 25px;
            }
            .product-card { padding: 15px; }
            .product-title { font-size: 1.1rem; }
            .buy-now:hover { background: #ff1a2b; transform: translateY(-2px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>SQUADGAMESTN</h1>
    </header>

    <main class="shop-container">
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-container">
                    <img src="1.jpg" alt="Criminal Case Tunisia 3 Cases" class="product-img">
                </div>
                <div class="product-info">
                    <div class="product-title">Criminal Case Tunisia 3 Cases</div>
                    <div class="price-tag">25 DT</div>
                    <span class="shipping-note">+ 7 DT توصيل</span>
                    <a href="https://tally.so/r/wojBeO" target="_blank" class="buy-now">اشتري الآن</a>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="2.jpg" alt="Criminal Case Tunisia 6 Cases" class="product-img">
                </div>
                <div class="product-info">
                    <div class="product-title">Criminal Case Tunisia 6 Cases</div>
                    <div class="price-tag">35 DT</div>
                    <span class="shipping-note">+ 7 DT توصيل</span>
                    <a href="https://tally.so/r/medkpo" target="_blank" class="buy-now">اشتري الآن</a>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="3.jpg" alt="UNO KOORA" class="product-img">
                </div>
                <div class="product-info">
                    <div class="product-title">UNO KOORA</div>
                    <div class="price-tag">35 DT</div>
                    <span class="shipping-note">+ 7 DT توصيل</span>
                    <a href="https://tally.so/r/yPMW58" target="_blank" class="buy-now">اشتري الآن</a>
                </div>
            </div>

            <div class="product-card">
                <div class="img-container">
                    <img src="4.jpg" alt="EYY LEE + JASOUS" class="product-img">
                </div>
                <div class="product-info">
                    <div class="product-title">EYY LEE + JASOUS</div>
                    <div class="price-tag">25 DT</div>
                    <span class="shipping-note">+ 7 DT توصيل</span>
                    <a href="#" target="_blank" class="buy-now">اشتري الآن</a>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <a href="https://www.instagram.com/squad.games.tn/" class="ig-icon-link" target="_blank" aria-label="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <div class="copyright">
            &copy; 2026 SQUADGAMESTN. MADE IN TUNISIA 🇹🇳
        </div>
    </footer>

</body>
</html>
